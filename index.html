<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>變臉・京劇臉譜 AR</title>

  <!-- 字體引入 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">

  <!-- 函式庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>

  <style>
    :root {
      --gold:   #c9a84c;
      --gold2:  #f5d67a;
      --red:    #9b1a1a;
      --deep:   #0a0606;
      --border: #3d2a10;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100%; height: 100vh;
      background-color: #050303;
      overflow: hidden;
      font-family: 'ZCOOL XiaoWei', serif;
      color: var(--gold);
    }

    /* 裝飾背景層 */
    #bg-layer {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
    }
    .bg-gradient {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(20,10,5,0) 0%, rgba(5,2,2,0.8) 100%);
    }

    /* ── 轉角裝飾 ── */
    .corner {
      position: fixed; z-index: 10; pointer-events: none;
      width: clamp(40px, 10vw, 80px); height: clamp(40px, 10vw, 80px);
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 10px; left: 10px; }
    .corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
    .corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
    .corner.br { bottom: 10px; right: 10px; transform: scale(-1,-1); }

    /* ── 頁首標題 ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      min-height: 60px; padding: 10px 20px;
      background: linear-gradient(180deg, rgba(8,4,4,0.9) 0%, transparent 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }

    .title-main {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      letter-spacing: 0.2em;
      color: var(--gold2);
      text-shadow: 0 0 15px rgba(201,168,76,0.5);
      white-space: nowrap;
    }
    .title-sub {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.4rem, 2vw, 0.6rem);
      letter-spacing: 0.2em;
      opacity: 0.5;
      margin-top: 4px;
    }

    /* ── 側邊欄 (電腦端顯示) ── */
    .col {
      position: fixed; top: 80px; bottom: 80px; z-index: 15;
      width: 40px; display: flex; flex-direction: column; 
      align-items: center; justify-content: space-between;
      opacity: 0.6; pointer-events: none;
    }
    @media (max-width: 768px) { .col { display: none; } } /* 手機隱藏 */
    
    .col.left { left: 15px; }
    .col.right { right: 15px; }
    .glyph { writing-mode: vertical-rl; letter-spacing: 0.5em; font-size: 0.9rem; }
    .vline { flex: 1; width: 1px; background: linear-gradient(transparent, var(--gold), transparent); margin: 10px 0; }

    /* ── 頁尾提示資訊 ── */
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 10px;
      background: linear-gradient(0deg, rgba(8,4,4,0.9) 0%, transparent 100%);
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 10px 20px;
      border-top: 1px solid rgba(201,168,76,0.15);
    }
    .tip {
      font-size: clamp(0.6rem, 2.5vw, 0.75rem);
      color: rgba(201,168,76,0.6);
      display: flex; align-items: center; gap: 5px;
    }
    .tip em { color: var(--gold2); font-style: normal; font-weight: bold; }

    /* ── 畫布容器 ── */
    #sketch-wrapper {
      position: absolute; inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── 水印與印章 ── */
    #watermark {
      position: fixed; bottom: 60px; right: 20px; z-index: 25;
      display: flex; flex-direction: column; align-items: flex-end;
    }
    .wm-name { font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem; margin-bottom: 5px; }
    .wm-seal {
      width: 35px; height: 35px; border: 1.5px solid var(--red);
      display: flex; align-items: center; justify-content: center;
      color: var(--red); font-size: 0.7rem; font-weight: bold;
    }

    /* ── 載入中 ── */
    #loading {
      position: fixed; inset: 0; z-index: 100; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading">
    <h1 style="font-family:'Ma Shan Zheng'; font-size: 3rem; color: var(--gold2);">變臉</h1>
    <p style="color: var(--gold); letter-spacing: 0.5em;">載入藝術資源中...</p>
  </div>

  <div id="bg-layer"><div class="bg-gradient"></div></div>

  <!-- 轉角裝飾 SVG -->
  <div class="corner tl"><svg viewBox="0 0 80 80" fill="none"><path d="M2 78 L2 2 L78 2" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 80 80" fill="none"><path d="M2 78 L2 2 L78 2" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 80 80" fill="none"><path d="M2 78 L2 2 L78 2" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 80 80" fill="none"><path d="M2 78 L2 2 L78 2" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/></svg></div>

  <header id="header">
    <div class="title-main">京劇臉譜 AR 變臉</div>
    <div class="title-sub">PEKING OPERA · AUGMENTED REALITY</div>
  </header>

  <aside class="col left">
    <div class="glyph">國粹藝術</div>
    <div class="vline"></div>
    <div class="glyph">戲曲神韻</div>
  </aside>

  <aside class="col right">
    <div class="glyph">手勢感應</div>
    <div class="vline"></div>
    <div class="glyph">即時換臉</div>
  </aside>

  <main id="sketch-wrapper"></main>

  <div id="watermark">
    <div class="wm-name">謝沐珊</div>
    <div class="wm-seal">沐珊</div>
  </div>

  <footer id="footer">
    <div class="tip">◀ <em>左右滑動</em> 切換臉譜</div>
    <div class="tip"><em>比數字 1-5</em> 切換配飾</div>
    <div class="tip"><em>張嘴/眨眼</em> 互動 ▶</div>
  </footer>

  <script>
    // --- p5.js Sketch 邏輯 ---
    let faceMesh;
    let video;
    let faces = [];
    let options = { maxFaces: 1, refineLandmarks: false, flipHorizontal: true };

    function setup() {
      const canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('sketch-wrapper');
      
      video = createCapture(VIDEO);
      video.size(windowWidth, windowHeight);
      video.hide();

      faceMesh = ml5.faceMesh(video, options, () => {
        document.getElementById('loading').classList.add('hidden');
      });
      faceMesh.detectStart(video, gotFaces);
    }

    function gotFaces(results) {
      faces = results;
    }

    function draw() {
      clear();
      
      // 繪製視訊鏡像
      push();
      translate(width, 0);
      scale(-1, 1);
      // 若要隱藏背景只留臉譜，可不畫 video
      // image(video, 0, 0, width, height); 
      pop();

      if (faces.length > 0) {
        let face = faces[0];
        drawMask(face);
      }
    }

    function drawMask(face) {
      // 這裡放置你的臉譜繪製邏輯
      // 使用 face.keypoints 獲取座標
      noFill();
      stroke(201, 168, 76, 150);
      
      // 範例：畫出臉部輪廓感應點
      for (let i = 0; i < face.keypoints.length; i += 10) {
        let p = face.keypoints[i];
        ellipse(p.x, p.y, 3, 3);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    // 禁止手機瀏覽器預設下拉刷新
    document.addEventListener('touchmove', (e) => { if(e.touches.length > 1) e.preventDefault(); }, {passive: false});
  </script>
</body>
</html>
